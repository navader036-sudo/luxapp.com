<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxapp | Helpdesk & AI Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #cbd5e1;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .sidebar-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border-right: 3px solid #6366f1;
        }

        #qrcode img {
            margin: 0 auto;
            padding: 12px;
            background: white;
            border-radius: 16px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        .chat-bubble-me {
            background: #4f46e5;
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .chat-bubble-them {
            background: #1e293b;
            color: #cbd5e1;
            border-radius: 18px 18px 18px 4px;
        }
    </style>
</head>

<body class="h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-64 border-r border-slate-800 flex flex-col">
        <div class="p-8">
            <h1 class="text-2xl font-extrabold text-white tracking-tighter italic">LUX<span
                    class="text-indigo-500">APP</span></h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">Enterprise Solution</p>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <button onclick="switchTab('dash')" id="btn-dash"
                class="sidebar-item active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </button>
            <button onclick="switchTab('helpdesk')" id="btn-helpdesk"
                class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all hover:bg-slate-800/50">
                <i class="fas fa-headset w-5"></i> Helpdesk Live
            </button>
            <button onclick="switchTab('ai')" id="btn-ai"
                class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all hover:bg-slate-800/50">
                <i class="fas fa-robot w-5"></i> Entrenamiento IA
            </button>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-900 border border-slate-800">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                <span id="status-text" class="text-[10px] font-bold uppercase tracking-tighter">Desconectado</span>
            </div>
            <p id="display-num" class="text-[10px] text-slate-500 mt-2 text-center font-mono">---</p>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 border-b border-slate-800 flex items-center px-8 bg-slate-950/50">
            <h2 id="tab-title" class="text-sm font-bold uppercase tracking-widest text-slate-400">Dashboard</h2>
        </header>

        <div id="tab-dash" class="flex-1 overflow-y-auto p-8 space-y-6">
            <div id="qr-section" class="max-w-xs glass-card p-6 rounded-[2rem] text-center hidden">
                <h3 class="text-white font-bold text-sm mb-4 uppercase">Vincular WhatsApp</h3>
                <div id="qrcode" class="mb-4"></div>
                <p class="text-[10px] text-slate-500">Escanea para activar el Helpdesk.</p>
            </div>
            <div id="connected-info" class="hidden">
                <div class="glass-card p-8 rounded-[2rem] border-l-4 border-l-emerald-500">
                    <h3 class="text-emerald-400 font-bold">Sistema Activo</h3>
                    <p class="text-sm text-slate-400 mt-2">La instancia está funcionando correctamente. Puedes usar el
                        Helpdesk o la API.</p>
                </div>
            </div>
        </div>

        <div id="tab-helpdesk" class="hidden flex-1 flex overflow-hidden">
            <!-- Contact List -->
            <div class="w-80 border-r border-slate-800 flex flex-col bg-slate-950/20">
                <div class="p-4 border-b border-slate-800">
                    <input type="text" placeholder="Buscar chat..."
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-white">
                </div>
                <div id="contact-list" class="flex-1 overflow-y-auto custom-scrollbar">
                    <!-- Chats will appear here -->
                </div>
            </div>
            <!-- Chat Window -->
            <div class="flex-1 flex flex-col">
                <div id="chat-header" class="h-14 border-b border-slate-800 flex items-center px-6 bg-slate-900/10">
                    <span id="active-contact-name" class="text-sm font-bold text-white">Selecciona un chat</span>
                </div>
                <div id="chat-messages"
                    class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar flex flex-col-reverse">
                    <!-- Messages will appear here -->
                </div>
                <div class="p-4 bg-slate-900/50 flex gap-2">
                    <input type="text" id="chat-input" placeholder="Escribe un mensaje..."
                        class="flex-1 bg-slate-800 border-none rounded-xl px-4 py-2 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button onclick="sendMessage()"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-xl px-6 transition">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="tab-ai" class="hidden flex-1 overflow-y-auto p-8 space-y-6">
            <div class="max-w-2xl glass-card p-8 rounded-[2rem]">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xl font-bold text-white">Módulo de Asistente Virtual</h3>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="ai-toggle" onchange="updateAIConfig()" class="sr-only peer">
                        <div
                            class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600">
                        </div>
                    </label>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">OpenAI
                            API Key (Opcional para IA Avanzada)</label>
                        <input type="password" id="ai-key" placeholder="sk-..." onchange="updateAIConfig()"
                            class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-indigo-500 transition">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Prompt
                            de Entrenamiento</label>
                        <textarea id="ai-prompt" rows="6" onchange="updateAIConfig()"
                            class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-indigo-500 transition resize-none"></textarea>
                    </div>
                    <button onclick="updateAIConfig(true)"
                        class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition uppercase text-xs tracking-widest">
                        Guardar Configuración
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        let currentJid = null;
        let chatData = {};
        const qrcodeGen = new QRCode(document.getElementById("qrcode"), { width: 180, height: 180 });

        function switchTab(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById('tab-title').innerText = tab.toUpperCase();
        }

        socket.on('status', (data) => {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const qrSec = document.getElementById('qr-section');
            const infoSec = document.getElementById('connected-info');
            const dispNum = document.getElementById('display-num');

            if (data.connected) {
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]";
                text.innerText = "En Línea";
                qrSec.classList.add('hidden');
                infoSec.classList.remove('hidden');
                dispNum.innerText = "+" + data.user;
            } else {
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                text.innerText = "Desconectado";
                infoSec.classList.add('hidden');
                dispNum.innerText = "Offline";
            }
        });

        socket.on('qr', (qr) => {
            document.getElementById('qr-section').classList.remove('hidden');
            qrcodeGen.clear();
            qrcodeGen.makeCode(qr);
        });

        socket.on('new_message', (data) => {
            if (!chatData[data.jid]) {
                chatData[data.jid] = { name: data.name, messages: [] };
            }
            chatData[data.jid].messages.push(data.message);
            updateContactList();
            if (currentJid === data.jid) renderMessages();
        });

        async function init() {
            const res = await fetch('/api/chats');
            chatData = await res.json();
            updateContactList();

            // Load status
            const statusRes = await fetch('/api/instance/status');
            const status = await statusRes.json();
            if (status.connected) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
                document.getElementById('status-text').innerText = "En Línea";
                document.getElementById('display-num').innerText = "+" + status.number;
                document.getElementById('connected-info').classList.remove('hidden');
            } else if (status.qrCode) {
                document.getElementById('qr-section').classList.remove('hidden');
                qrcodeGen.clear();
                qrcodeGen.makeCode(status.qrCode);
            }
        }

        function updateContactList() {
            const container = document.getElementById('contact-list');
            container.innerHTML = '';
            Object.keys(chatData).forEach(jid => {
                const chat = chatData[jid];
                const lastMsg = chat.messages[chat.messages.length - 1];
                const div = document.createElement('div');
                div.className = `p-4 flex items-center gap-3 cursor-pointer hover:bg-slate-800 transition ${currentJid === jid ? 'bg-slate-800 border-l-4 border-indigo-500' : ''}`;
                div.onclick = () => selectChat(jid);
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 font-bold">
                        ${chat.name.charAt(0)}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="flex justify-between items-center">
                            <h4 class="text-xs font-bold text-white truncate">${chat.name}</h4>
                            <span class="text-[9px] text-slate-500">${new Date(lastMsg?.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        </div>
                        <p class="text-[10px] text-slate-400 truncate mt-1">${lastMsg?.text || ''}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function selectChat(jid) {
            currentJid = jid;
            document.getElementById('active-contact-name').innerText = chatData[jid].name;
            updateContactList();
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            const messages = [...chatData[currentJid].messages].reverse();
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `flex ${msg.fromMe ? 'justify-end' : 'justify-start'}`;
                div.innerHTML = `
                    <div class="max-w-[80%] px-4 py-2 ${msg.fromMe ? 'chat-bubble-me' : 'chat-bubble-them'}">
                        <p class="text-sm">${msg.text}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !currentJid) return;

            const to = currentJid.split('@')[0];
            await fetch('/api/instance/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to, message })
            });

            input.value = '';
        }

        async function updateAIConfig(showNotif = false) {
            const config = {
                enabled: document.getElementById('ai-toggle').checked,
                prompt: document.getElementById('ai-prompt').value,
                apiKey: document.getElementById('ai-key').value
            };
            await fetch('/api/ai/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
            if (showNotif) alert("✅ Configuración de IA guardada");
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        init();
    </script>
</body>

</html>
